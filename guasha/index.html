<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stainless Steel Gua Sha Massage Tool Kits | Use Manual</title>
  <meta name="description" content="Use manual for stainless steel gua sha massage tool kits, including how to use each scraper, body area guide, care, safety, and after-sales support.">
  <style>
    :root {
      --ink: #231915;
      --paper: #fffaf4;
      --muted: #6c625d;
      --line: #d9d0c8;
      --soft: #f4eee8;
      --accent: #281b17;
      --gold: #b98754;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: #eee8e1;
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.55;
    }

    a {
      color: inherit;
    }

    .hero {
      background: var(--accent);
      color: #fff;
      padding: 34px 18px 28px;
      text-align: center;
    }

    .hero h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(30px, 8vw, 54px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .hero .sub {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-top: 18px;
      color: #efe8e2;
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .hero .sub::before,
    .hero .sub::after {
      content: "";
      width: 42px;
      height: 1px;
      background: rgba(255, 255, 255, 0.45);
    }

    .wrap {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
    }

    .product-panel {
      margin: -18px auto 22px;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 14px 38px rgba(35, 25, 21, 0.14);
      overflow: hidden;
    }

    .product-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 0;
      align-items: center;
    }

    .product-image {
      min-height: 260px;
      padding: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
    }
